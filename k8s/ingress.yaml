apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fairpay-ingress
  namespace: fairpay
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - fairpay.app
    secretName: fairpay-tls
  rules:
  - host: fairpay.app
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 80
      - path: /webhooks
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
