apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: fairpay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/username/fairpay-backend:latest
          command: ["npm", "run", "worker"]
          envFrom:
            - secretRef:
                name: backend-secrets
